<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ansura Options</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px;
      min-width: 320px;
      color: #1a1a1a;
      background: #fff;
    }
    h1 { font-size: 18px; margin: 0 0 20px; font-weight: 600; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #374151; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
    }
    input:focus { border-color: #63B3ED; box-shadow: 0 0 0 2px rgba(99,179,237,0.2); }
    button {
      padding: 7px 18px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    #status { margin-left: 10px; font-size: 13px; color: #16a34a; }
    .hint {
      font-size: 11px;
      color: #6b7280;
      margin-top: -10px;
      margin-bottom: 14px;
    }
    .hint code {
      font-family: ui-monospace, monospace;
      background: #f3f4f6;
      padding: 1px 4px;
      border-radius: 3px;
      cursor: pointer;
      color: #374151;
    }
    .hint code:hover { background: #e5e7eb; }
  </style>
</head>
<body>
  <h1>Ansura Settings</h1>

  <label for="api-key">Gemini API Key</label>
  <input type="password" id="api-key" placeholder="Enter your Gemini API key">

  <label for="model">Model</label>
  <input type="text" id="model" placeholder="gemini-3-flash-preview">
  <p class="hint">
    Options:
    <code>gemini-2.5-flash-lite</code>
    <code>gemini-2.5-flash</code>
    <code>gemini-3-flash-preview</code>
  </p>

  <div>
    <button id="save-btn">Save</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
