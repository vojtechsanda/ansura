<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ansura Options</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 24px;
        min-width: 320px;
        color: #1a1a1a;
        background: #fff;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 20px;
        font-weight: 600;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 4px;
        color: #374151;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 10px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
        font-size: 13px;
        margin-bottom: 14px;
        outline: none;
      }

      input:focus {
        border-color: #63b3ed;
        box-shadow: 0 0 0 2px rgba(99, 179, 237, 0.2);
      }

      button {
        padding: 7px 18px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover {
        background: #2563eb;
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }

      #test-btn {
        background: #6b7280;
      }

      #test-btn:hover:not(:disabled) {
        background: #4b5563;
      }

      #status {
        margin-left: 10px;
        font-size: 13px;
        color: #16a34a;
      }

      .hint {
        font-size: 11px;
        color: #6b7280;
        margin-top: -10px;
        margin-bottom: 14px;
      }

      .hint code {
        font-family: ui-monospace, monospace;
        background: #f3f4f6;
        padding: 1px 4px;
        border-radius: 3px;
        cursor: pointer;
        color: #374151;
      }

      .hint code:hover {
        background: #e5e7eb;
      }

      #test-result {
        display: none;
        margin-top: 10px;
      }

      #test-result.show {
        display: block;
        border: 1px solid #e5e7eb;
        border-radius: 5px;
        padding: 2px 10px;
      }

      .test-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        padding: 6px 0;
        border-bottom: 1px solid #f3f4f6;
        font-size: 12px;
      }

      .test-row:last-child {
        border-bottom: none;
      }

      .test-model {
        font-family: ui-monospace, monospace;
        color: #374151;
        flex-shrink: 0;
      }

      .test-status {
        text-align: right;
      }

      .test-status.pending {
        color: #9ca3af;
      }

      .test-status.ok {
        color: #15803d;
      }

      .test-status.err {
        color: #b91c1c;
      }
    </style>
  </head>

  <body>
    <h1>Ansura Settings</h1>

    <label for="api-key">Gemini API Key</label>
    <input type="password" id="api-key" placeholder="Enter your Gemini API key" />

    <label for="model">Model</label>
    <input type="text" id="model" placeholder="gemini-3-flash-preview" />
    <p class="hint">
      Suggestions (or type any valid model name):
      <code>gemini-3-flash-preview</code>
      <code>gemini-3.1-flash-lite-preview</code>
      <code>gemini-2.5-flash</code>
      <code>gemini-2.5-flash-lite</code>
    </p>

    <label for="fallback-models"
      >Fallback models
      <span style="font-weight: 400; color: #9ca3af">(on failure, tried in order)</span></label
    >
    <input
      type="text"
      id="fallback-models"
      placeholder="gemini-3.1-flash-lite-preview, gemini-2.5-flash" />
    <p class="hint">Comma-separated. Leave empty to disable fallback.</p>

    <div>
      <button id="save-btn">Save</button>
      <button id="test-btn">Test models</button>
      <span id="status"></span>
    </div>
    <div id="test-result"></div>

    <script src="options.js"></script>
  </body>
</html>
